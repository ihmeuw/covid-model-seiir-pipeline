data:
  output_root: ''
workflow:
  project: 'proj_covid'
  queue: 'd.q'
  tasks:
    grid_plots:
      max_runtime_seconds: 5000
      m_mem_free: '200G'
      num_cores: 70
grid_plots:
  # List of jobs we want to run. Each job should have a unique "name"
  - name: 'compare_longrange'
    # Start and end of the plots.
    date_start: '2020-03-01'
    date_end: '2021-12-31'
    # The versions and scenarios we want on this plot.
    comparators:
      # Full path or DATE.VV or latest/best
      - version: '/ihme/covid-19/seir-outputs/2021_01_27.03'
        scenarios:
          # Keys are scenarios and values are plot labels. Within a job,
          # good idea to keep the plot labels unique.
          worse: '85% VE'
      - version: '/ihme/covid-19/seir-outputs/2021_01_27.02'
        scenarios:
          # Keys are scenarios and values are plot labels. Within a job,
          # good idea to keep the plot labels unique.
          worse: 'no vaccine'
      - version: '/ihme/covid-19/seir-outputs/2021_01_21.09'
        scenarios:
          worse*: 'public worse'
      - version: '/ihme/covid-19/seir-outputs/2021_01_27.04'
        scenarios:
          # Keys are scenarios and values are plot labels. Within a job,
          # good idea to keep the plot labels unique.
          worse: '75% VE'
      - version: '/ihme/covid-19/seir-outputs/2021_01_27.05'
        scenarios:
          # Keys are scenarios and values are plot labels. Within a job,
          # good idea to keep the plot labels unique.
          worse: '94% VE'


